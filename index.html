<!DOCTYPE html>
<html>
<head>
    <title>Jump Tracker Pro (Visible Scan)</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0">
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js"></script>
    <style>
        body { font-family: -apple-system, sans-serif; background: #000; color: #fff; text-align: center; margin: 0; padding: 10px; }
        #container { position: relative; width: 100%; max-width: 500px; margin: auto; background: #111; border-radius: 20px; overflow: hidden; border: 2px solid #333; }
        canvas { width: 100%; display: block; }
        .controls { padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        label { background: #00ff88; color: #000; padding: 18px; border-radius: 15px; font-weight: bold; cursor: pointer; font-size: 18px; }
        #fileInput { display: none; }
        
        /* Progress Bar UI */
        #progressContainer { display: none; margin-top: 10px; }
        #progressBar { width: 100%; height: 10px; background: #333; border-radius: 5px; overflow: hidden; }
        #progressFill { width: 0%; height: 100%; background: #00ff88; transition: width 0.1s; }
        
        .res-box { font-size: 45px; color: #00ff88; margin: 10px 0; font-weight: 900; }
        .status-msg { font-size: 14px; color: #00ff88; height: 20px; text-transform: uppercase; letter-spacing: 1px; }
    </style>
</head>
<body>
    <div id="container">
        <canvas id="out_canvas"></canvas>
    </div>

    <div class="controls">
        <div id="status" class="status-msg">READY FOR UPLOAD</div>
        <div id="progressContainer">
            <div id="progressBar"><div id="progressFill"></div></div>
            <p id="progressPercent" style="font-size: 12px; margin-top: 5px;">0% Analyzed</p>
        </div>
        
        <div id="result" class="res-box">-- cm</div>
        
        <label for="fileInput">SELECT JUMP VIDEO</label>
        <input type="file" id="fileInput" accept="video/*">
        
        <p style="font-size: 12px; color: #666;">Note: Slow-mo videos take 30-60 seconds to scan.</p>
    </div>

    <video id="vid" style="display:none" playsinline muted crossorigin="anonymous"></video>

    <script>
        const video = document.getElementById('vid');
        const canvas = document.getElementById('out_canvas');
        const ctx = canvas.getContext('2d');
        const heightDisplay = document.getElementById('result');
        const status = document.getElementById('status');
        const progressFill = document.getElementById('progressFill');
        const progressPercent = document.getElementById('progressPercent');
        const progressContainer = document.getElementById('progressContainer');

        let floorY = 0; 
        let takeoffTime = null;
        let isJumping = false;
        let jumpLog = [];

        // 1. Initialize AI
        const pose = new Pose({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}`});
        pose.setOptions({ modelComplexity: 1, smoothLandmarks: true, minDetectionConfidence: 0.5 });

        pose.onResults((results) => {
            canvas.width = results.image.width;
            canvas.height = results.image.height;
            ctx.drawImage(results.image, 0, 0, canvas.width, canvas.height);

            if (results.poseLandmarks) {
                const ankles = (results.poseLandmarks[27].y + results.poseLandmarks[28].y) / 2;
                if (ankles > floorY) floorY = ankles;

                const threshold = floorY - 0.015; // 1.5% screen height
                
                if (!isJumping && ankles < threshold) {
                    isJumping = true;
                    takeoffTime = video.currentTime;
                } else if (isJumping && ankles > threshold) {
                    isJumping = false;
                    let flightTime = video.currentTime - takeoffTime;
                    if (flightTime > 0.15) {
                        let heightCm = 122.5 * Math.pow(flightTime, 2);
                        jumpLog.push(heightCm);
                        heightDisplay.innerText = Math.max(...jumpLog).toFixed(1) + " cm";
                    }
                }

                // Visual markers
                ctx.strokeStyle = "red"; ctx.lineWidth = 8;
                ctx.beginPath(); ctx.moveTo(0, floorY * canvas.height); ctx.lineTo(canvas.width, floorY * canvas.height); ctx.stroke();
                ctx.fillStyle = "#00ff88"; ctx.beginPath(); ctx.arc(results.poseLandmarks[27].x * canvas.width, ankles * canvas.height, 15, 0, Math.PI*2); ctx.fill();
            }
        });

        // 2. Handle File Upload
        document.getElementById('fileInput').onchange = (e) => {
            const file = e.target.files[0];
            if (!file) return;

            status.innerText = "LOADING VIDEO...";
            progressContainer.style.display = "block";
            heightDisplay.innerText = "-- cm";
            jumpLog = [];
            floorY = 0;

            video.src = URL.createObjectURL(file);
            video.onloadeddata = () => {
                video.pause();
                processFrameByFrame();
            };
        };

        // 3. Precise Frame-by-Frame Processing
        async function processFrameByFrame() {
            const fps = 30; // We'll scan at 30 intervals per second of video
            const totalDuration = video.duration;
            
            for (let t = 0; t <= totalDuration; t += 1/fps) {
                video.currentTime = t;
                
                // Wait for the video to actually seek to the frame
                await new Promise(r => video.onseeked = r);
                
                // Send frame to AI
                await pose.send({image: video});

                // Update Progress Bar
                let percent = Math.round((t / totalDuration) * 100);
                progressFill.style.width = percent + "%";
                progressPercent.innerText = percent + "% Analyzed";
                status.innerText = "SCANNING JUMP...";
            }

            status.innerText = "ANALYSIS COMPLETE";
            progressPercent.innerText = "100% Done";
        }
    </script>
</body>
</html>
