<!DOCTYPE html>
<html>
<head>
    <title>Jump Lab: Landscape Edition</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0">
    <style>
        * { touch-action: manipulation; -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
        body { font-family: -apple-system, sans-serif; background: #000; color: #fff; text-align: center; margin: 0; padding: 10px; }
        
        /* Layout Fix: Adapts to Landscape or Portrait */
        .container { max-width: 800px; margin: auto; display: flex; flex-direction: column; gap: 10px; }
        
        .video-wrapper { 
            width: 100%; 
            background: #111; 
            border-radius: 15px; 
            overflow: hidden; 
            border: 2px solid #333; 
            display: flex;
            align-items: center;
            justify-content: center;
            max-height: 60vh; /* Keeps video from taking over the whole screen */
        }
        video { width: 100%; height: auto; max-height: 60vh; display: block; }
        
        #result { font-size: 64px; font-weight: 900; color: #00ff88; margin: 10px 0; font-variant-numeric: tabular-nums; }
        .unit { font-size: 24px; vertical-align: middle; }

        /* Mode Selection Grid */
        .settings-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 10px; }
        .mode-btn { padding: 12px; border-radius: 10px; border: 1px solid #444; background: #222; color: #888; font-weight: bold; cursor: pointer; font-size: 12px; }
        .mode-btn.active { background: #00ff88; color: #000; border-color: #00ff88; }

        /* Navigation Controls */
        .controls { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
        .upload-btn { background: #00ff88; color: #000; grid-column: span 4; padding: 18px; border-radius: 12px; font-weight: 900; cursor: pointer; }
        .step-btn { background: #333; color: white; border: none; padding: 20px 5px; border-radius: 12px; font-size: 18px; font-weight: bold; }
        .mark-btn { grid-column: span 2; background: #ff4444; color: white; border: none; padding: 18px; border-radius: 12px; font-weight: bold; font-size: 14px; margin-top: 5px; }
        
        input[type=range] { width: 100%; height: 40px; accent-color: #00ff88; margin: 5px 0; }
        .info-bar { display: flex; justify-content: space-between; font-family: monospace; font-size: 13px; color: #aaa; padding: 0 5px; }
        
        #history { width: 100%; margin-top: 20px; text-align: left; border-collapse: collapse; }
        #history td { padding: 10px; border-bottom: 1px solid #222; font-size: 14px; }
        .hist-res { color: #00ff88; font-weight: bold; text-align: right; }
    </style>
</head>
<body>

<div class="container">
    <div id="result">0.0<span class="unit">cm</span></div>

    <div class="settings-grid">
        <button id="mode-norm" class="mode-btn active" onclick="setMode('norm', 1)">NORMAL (30/60)</button>
        <button id="mode-120" class="mode-btn" onclick="setMode('120', 4)">SLO-MO (120)</button>
        <button id="mode-240" class="mode-btn" onclick="setMode('240', 8)" style="grid-column: span 2;">SLO-MO (240 FPS)</button>
    </div>

    <div class="video-wrapper">
        <video id="vid" playsinline muted preload="auto"></video>
    </div>

    <div class="info-bar">
        <span id="time-display">0.000s</span>
        <span id="status">Upload Jump</span>
    </div>
    
    <input type="range" id="scrubber" min="0" max="100" step="0.0001" value="0">

    <div class="controls">
        <label for="fileInput" class="upload-btn">SELECT VIDEO</label>
        <input type="file" id="fileInput" accept="video/*" style="display:none">

        <button class="step-btn" onclick="move(-0.1)">«</button>
        <button class="step-btn" onclick="move(-0.0333)">‹</button>
        <button class="step-btn" onclick="move(0.0333)">›</button>
        <button class="step-btn" onclick="move(0.1)">»</button>

        <button class="mark-btn" onclick="mark('take')">MARK TAKEOFF</button>
        <button class="mark-btn" onclick="mark('land')">MARK LANDING</button>
    </div>

    <table id="history"></table>
</div>

<script>
    const v = document.getElementById('vid');
    const res = document.getElementById('result');
    const scrub = document.getElementById('scrubber');
    const hist = document.getElementById('history');
    
    let t1 = null, t2 = null;
    let timeFactor = 1; // Divisor for slo-mo math

    function setMode(id, factor) {
        document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('mode-' + id).classList.add('active');
        timeFactor = factor;
        calculate(false);
    }

    document.getElementById('fileInput').onchange = (e) => {
        const file = e.target.files[0];
        if (file) {
            v.src = URL.createObjectURL(file);
            v.onloadedmetadata = async () => {
                scrub.max = v.duration;
                // Force Render
                v.currentTime = 0.1; await v.play(); v.pause(); v.currentTime = 0;
                document.getElementById('status').innerText = "Video Ready";
            };
        }
    };

    function move(sec) { v.currentTime += sec; }
    
    scrub.oninput = () => { v.currentTime = scrub.value; };
    v.ontimeupdate = () => { 
        scrub.value = v.currentTime;
        document.getElementById('time-display').innerText = v.currentTime.toFixed(3) + "s";
    };

    function mark(type) {
        if (type === 'take') {
            t1 = v.currentTime;
            document.getElementById('status').innerText = "Takeoff Set";
        } else {
            t2 = v.currentTime;
            document.getElementById('status').innerText = "Landing Set";
            calculate(true);
        }
    }

    function calculate(save) {
        if (t1 !== null && t2 !== null && t2 > t1) {
            // Physics: Height = 1.22625 * (FlightTime)^2
            let flightTime = (t2 - t1) / timeFactor;
            let height = 122.625 * Math.pow(flightTime, 2);
            
            res.innerHTML = height.toFixed(1) + '<span class="unit">cm</span>';

            if (save) {
                const row = hist.insertRow(0);
                row.innerHTML = `<td>Jump ${hist.rows.length + 1}</td><td class="hist-res">${height.toFixed(1)} cm</td>`;
            }
        }
    }
</script>
</body>
</html>
