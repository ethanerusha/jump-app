<!DOCTYPE html>
<html>
<head>
    <title>Jump Lab Pro</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0">
    <style>
        body { font-family: -apple-system, sans-serif; background: #000; color: #fff; text-align: center; margin: 0; padding: 15px; }
        .video-wrapper { width: 100%; max-width: 500px; margin: auto; background: #222; border-radius: 15px; overflow: hidden; min-height: 200px; border: 2px solid #333; }
        video { width: 100%; display: block; }
        .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px; }
        button, label { background: #333; color: white; border: none; padding: 18px; border-radius: 12px; font-weight: bold; font-size: 14px; }
        .primary { background: #00ff88; color: #000; }
        .scrub { background: #444; flex: 1; padding: 15px 5px; }
        #result { font-size: 50px; font-weight: 900; color: #00ff88; margin: 20px 0; }
        #fileInput { display: none; }
        .scrub-row { grid-column: span 2; display: flex; gap: 5px; }
    </style>
</head>
<body>

    <div class="video-wrapper">
        <video id="vid" playsinline muted controls></video>
    </div>

    <div class="controls">
        <label for="fileInput" class="primary" style="grid-column: span 2;">1. SELECT VIDEO</label>
        <input type="file" id="fileInput" accept="video/*">

        <div class="scrub-row">
            <button class="scrub" onclick="move(-0.033)">-1 Frame</button>
            <button class="scrub" onclick="move(-0.004)">-SloMo</button>
            <button class="scrub" onclick="move(0.004)">+SloMo</button>
            <button class="scrub" onclick="move(0.033)">+1 Frame</button>
        </div>

        <button style="background:#ff4444" onclick="mark('takeoff')">MARK TAKEOFF</button>
        <button style="background:#ff4444" onclick="mark('landing')">MARK LANDING</button>
    </div>

    <div id="result">-- cm</div>
    <div id="debug" style="font-size:12px; color:#666;">Ready...</div>

    <script>
        const v = document.getElementById('vid');
        const res = document.getElementById('result');
        const dbg = document.getElementById('debug');
        let t1 = 0, t2 = 0;

        document.getElementById('fileInput').onchange = (e) => {
            const file = e.target.files[0];
            if (!file) return;
            
            // This creates a temporary URL for your video file
            v.src = URL.createObjectURL(file);
            v.style.display = "block";
            
            // Force the iPhone to load the video
            v.load();
            dbg.innerText = "Video loading... Tap play to verify.";
        };

        function move(sec) { v.currentTime += sec; }

        function mark(type) {
            if (type === 'takeoff') {
                t1 = v.currentTime;
                dbg.innerText = `Takeoff set: ${t1.toFixed(4)}s`;
            } else {
                t2 = v.currentTime;
                dbg.innerText = `Landing set: ${t2.toFixed(4)}s`;
            }
            if (t1 > 0 && t2 > t1) {
                let flightTime = t2 - t1;
                let heightCm = 122.5 * Math.pow(flightTime, 2);
                res.innerText = heightCm.toFixed(2) + " cm";
            }
        }
    </script>
</body>
</html>
